services:
  api1:
    build: .
    image: fraud-api-local
    container_name: api1
    restart: unless-stopped
    mem_limit: 160m
    cpus: 0.40
  api2:
    build: .
    image: fraud-api-local
    container_name: api2
    restart: unless-stopped
    mem_limit: 160m
    cpus: 0.40

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    mem_limit: 30m
    cpus: 0.20
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro